<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>荔知 · 排行榜样式 05 · 极简榜</title>
<style>
:root {
  --bg: #f0f7ed;
  --card: #fff;
  --line: #c8dcc3;
  --text: #2d3a29;
  --muted: #6b7a66;
  --primary: #5a8f5c;
  --accent: #e8743f;
  --title-font: "ZCOOL XiaoWei", "STKaiti", serif;
  --body-font: "LXGW WenKai TC", "PingFang SC", sans-serif;
  --tag-font: "Nunito", Arial, sans-serif;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  color: var(--text);
  font-family: var(--body-font);
  background: var(--bg);
}
main {
  width: min(960px, calc(100% - 32px));
  margin: 0 auto;
  padding: 42px 0;
}
.strip {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.88);
  box-shadow: 0 10px 30px rgba(45, 58, 41, 0.08);
}
.head {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 16px;
  align-items: center;
  padding: 16px 18px;
  border-bottom: 1px solid var(--line);
}
h1 {
  margin: 0;
  color: var(--primary);
  font-family: var(--title-font);
  font-size: 24px;
}
.updated, .meta {
  color: var(--muted);
  font-family: var(--tag-font);
  font-size: 12px;
}
.items {
  display: grid;
}
.item {
  display: grid;
  grid-template-columns: 38px minmax(0, 1fr) auto;
  gap: 12px;
  align-items: center;
  min-height: 62px;
  padding: 12px 18px;
  border-bottom: 1px solid rgba(200, 220, 195, 0.72);
}
.item:last-child { border-bottom: 0; }
.rank {
  color: var(--primary);
  font-family: var(--tag-font);
  font-weight: 900;
}
h2 {
  margin: 0 0 4px;
  font-size: 16px;
  line-height: 1.35;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.heat {
  min-width: 72px;
  text-align: right;
  color: var(--accent);
  font-family: var(--tag-font);
  font-weight: 900;
}
.label {
  display: inline-flex;
  margin-right: 8px;
  color: var(--primary);
  font-weight: 800;
}
@media (max-width: 640px) {
  main { width: min(100% - 20px, 960px); padding: 20px 0; }
  .head { grid-template-columns: 1fr; }
  .item { grid-template-columns: 30px minmax(0, 1fr); }
  h2 { white-space: normal; }
  .heat { grid-column: 2; text-align: left; min-width: 0; }
}
</style>
</head>
<body>
<main>
  <section class="strip" aria-label="热门活动排行榜">
    <header class="head">
      <div>
        <h1>热门活动排行榜</h1>
        <div class="meta">极简榜 · 占用空间小，适合移动端和首页窄区域</div>
      </div>
      <div class="updated">更新于 2026-06-08 14:30</div>
    </header>
    <div class="items">
      <article class="item">
        <div class="rank">01</div>
        <div>
          <h2>校园文化节志愿者招募</h2>
          <div class="meta"><span class="label">志愿公益</span>截止 06-12 · 学生会</div>
        </div>
        <div class="heat">热度 96</div>
      </article>
      <article class="item">
        <div class="rank">02</div>
        <div>
          <h2>华为校园招聘宣讲会</h2>
          <div class="meta"><span class="label">就业招聘</span>活动 06-10 · 就业中心</div>
        </div>
        <div class="heat">热度 91</div>
      </article>
      <article class="item">
        <div class="rank">03</div>
        <div>
          <h2>粤港澳创新创业大赛报名</h2>
          <div class="meta"><span class="label">学科竞赛</span>截止 06-18 · 创新创业学院</div>
        </div>
        <div class="heat">热度 88</div>
      </article>
      <article class="item">
        <div class="rank">04</div>
        <div>
          <h2>AI 学术讲座：大模型与教育</h2>
          <div class="meta"><span class="label">讲座论坛</span>活动 06-13 · 计算机学院</div>
        </div>
        <div class="heat">热度 84</div>
      </article>
      <article class="item">
        <div class="rank">05</div>
        <div>
          <h2>留学申请经验分享会</h2>
          <div class="meta"><span class="label">升学留学</span>活动 06-15 · 国际交流处</div>
        </div>
        <div class="heat">热度 79</div>
      </article>
    </div>
  </section>
</main>
</body>
</html>
